<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMarketAnalyzer — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --green: #3fb950;
            --yellow: #d29922;
            --orange: #db6d28;
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #bc8cff;
            --gold: #e3b341;
            --accent-gradient: linear-gradient(135deg, #58a6ff, #bc8cff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .regime-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .regime-calm {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .regime-normal {
            background: rgba(210, 153, 34, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(210, 153, 34, 0.3);
        }

        .regime-stress {
            background: rgba(219, 109, 40, 0.15);
            color: var(--orange);
            border: 1px solid rgba(219, 109, 40, 0.3);
        }

        .regime-panic {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Grid ── */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            padding: 20px 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(88, 166, 255, 0.3);
        }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Info btn ── */
        .info-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(88, 166, 255, 0.12);
            color: var(--blue);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid rgba(88, 166, 255, 0.3);
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .info-btn:hover {
            background: rgba(88, 166, 255, 0.25);
            transform: scale(1.1);
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 560px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .modal-section {
            margin-bottom: 16px;
        }

        .modal-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--blue);
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .modal-state {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            padding: 8px 12px;
            margin: 6px 0;
            background: var(--bg-primary);
            border-radius: 8px;
            border-left: 3px solid var(--border);
        }

        .modal-state-label {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            min-width: 100px;
        }

        .modal-state-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-tip {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .modal-tip-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--blue);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-tip-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ── VIX ── */
        .vix-card {
            grid-column: 1;
        }

        .vix-big {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .vix-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .chart-container {
            height: 160px;
            margin-top: 12px;
        }

        /* ── Yields ── */
        .yields-card {
            grid-column: 2;
        }

        .yield-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }

        .yield-row:last-child {
            border: none;
        }

        .yield-label {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .yield-value {
            font-size: 14px;
            font-weight: 600;
        }

        .yield-change {
            font-size: 12px;
            margin-left: 8px;
        }

        /* ── Regime ── */
        .regime-card {
            grid-column: 3;
        }

        .crisis-type {
            font-size: 15px;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .refuge-rec {
            padding: 12px;
            background: rgba(88, 166, 255, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            margin-bottom: 12px;
        }

        .refuge-rec-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--blue);
            margin-bottom: 6px;
        }

        .refuge-rec-text {
            font-size: 14px;
            font-weight: 500;
        }

        .signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .signal-label {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .signal-value {
            font-weight: 600;
        }

        /* ── Instruments ── */
        .instruments-card {
            grid-column: 1 / 3;
        }

        .instruments-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .instrument {
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
        }

        .instrument-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .instrument-ticker {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .instrument-name {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .instrument-price {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .instrument-changes {
            display: flex;
            gap: 8px;
            font-size: 11px;
        }

        .chg-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .chg-pos {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .chg-neg {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        /* ── FRED ── */
        .fred-card {
            grid-column: 3;
        }

        .fred-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }

        .fred-item:last-child {
            border: none;
        }

        .fred-name {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fred-value-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }

        .fred-val {
            font-size: 15px;
            font-weight: 600;
        }

        .fred-chg {
            font-size: 12px;
        }

        /* ── Stocks ── */
        .stocks-card {
            grid-column: 1 / -1;
        }

        .stocks-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .stocks-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .stocks-table th:hover {
            color: var(--blue);
        }

        .stocks-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .stocks-table tr:hover td {
            background: rgba(88, 166, 255, 0.03);
        }

        .score-bar {
            display: inline-flex;
            gap: 2px;
        }

        .score-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--border);
        }

        .score-dot.active {
            background: var(--green);
        }

        .score-dot.active.high {
            background: var(--blue);
        }

        /* ── Prompt ── */
        .prompt-card {
            grid-column: 1 / -1;
        }

        .prompt-text {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .copy-feedback {
            display: none;
            color: var(--green);
            font-size: 13px;
            font-weight: 500;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--text-secondary);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }

            .instruments-card,
            .stocks-card,
            .prompt-card {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .vix-card,
            .yields-card,
            .regime-card,
            .instruments-card,
            .fred-card {
                grid-column: 1;
            }

            .instruments-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-left">
            <h1>📊 GlobalMarketAnalyzer</h1>
            <span id="regime-badge" class="regime-badge regime-normal">—</span>
        </div>
        <div class="header-right">
            <span id="timestamp" class="timestamp">—</span>
            <button class="btn" onclick="refreshData()">⟳ Refresh</button>
        </div>
    </header>

    <main class="dashboard" id="dashboard">
        <div class="loading">
            <div class="spinner"></div> Cargando datos de mercado...
        </div>
    </main>

    <!-- Glossary Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let DATA = null;

        // ══════════════════════════════════════════════════
        // GLOSSARY — Explanations a prueba de dummies
        // ══════════════════════════════════════════════════
        const GLOSSARY = {
            VIX: {
                icon: '😱', title: 'VIX — El "índice del miedo"',
                what: 'Imagina un termómetro que mide cuánto MIEDO hay en el mercado. No mide si las acciones suben o bajan, sino cuánto NERVIOSISMO hay entre los inversores. Se calcula mirando el precio de los "seguros" (opciones) que la gente compra para protegerse.\n\n🔬 CÓMO LO CALCULAMOS: Usamos el valor del VIX directamente de Yahoo Finance (^VIX). Los umbrales <15, 15-20, 20-30, >30 se basan en la distribución histórica del VIX desde 1990: la media histórica es ~19, el percentil 25 es ~14, y el percentil 90 es ~30. Nuestro backtest de 21 años (2004-2026) probó umbrales fijos de 15 a 35 en grid search; el umbral 20 (VIX_GATE=20) dió el mejor Sharpe ratio con umbral fijo (Sharpe 2.11). Pero la comparación VIX vs MA20 fue aún mejor (Sharpe 3.52).',
                states: [
                    ['🟢 Menos de 15', 'CALMA TOTAL. VIX por debajo del percentil 25 histórico. Buen momento para momentum.'],
                    ['🟡 Entre 15-20', 'NORMAL. Rango medio histórico (media ~19). Sin acción necesaria.'],
                    ['🟠 Entre 20-30', 'NERVIOSISMO. Por encima de la media. Nuestro gate (VIX_GATE=20) activa modo refugio aquí.'],
                    ['🔴 Más de 30', 'PÁNICO. Percentil 90+. Históricamente marca suelo de mercado (oportunidad en 1-2 semanas).'],
                ],
                tip: 'Nuestro sistema usa DOS gates simultáneos: (1) VIX > 20 (umbral fijo) y (2) VIX > MA20 (relativo). Si AMBOS están en rojo, la señal es fuerte. Si solo uno, es señal débil. Los umbrales vienen del backtest walk-forward sobre 19 periodos históricos.',
            },
            MA20: {
                icon: '📊', title: 'Media Móvil 20 días (MA20)',
                what: 'Es el promedio del VIX de los últimos 20 días hábiles (≈1 mes). Fórmula: MA20 = suma(VIX de los últimos 20 días) / 20.\n\n🔬 POR QUÉ MA20 Y NO OTRO: Probamos MA10, MA20, MA50 y MA100 en backtest. MA20 dió el mejor Sharpe ratio (3.52) vs MA50 (2.8) y MA10 (2.1, demasiados cambios). 20 días = ~1 mes de trading, captura el "régimen reciente" sin ser ni muy nervioso ni muy lento.',
                states: [
                    ['VIX > MA20', '🔴 GATE ACTIVO. El miedo de HOY es mayor que el promedio del último mes. Nuestro backtest mostró que esta señal adelanta correcciones con Sharpe 3.52 (el mejor de todos los métodos probados).'],
                    ['VIX ≈ MA20', '🟡 NEUTRAL. El VIX está en línea con su media reciente.'],
                    ['VIX < MA20', '🟢 CALMA relativa. El miedo baja respecto al mes anterior.'],
                ],
                tip: 'Resultado del backtest walk-forward (2004-2026, 19 periodos): VIX>MA20 → Sharpe 3.52, Win rate 63%. VIX>20 fijo → Sharpe 2.11. VIX>25 fijo → Sharpe 1.85. Por eso usamos MA20 como gate principal. NOTA: Sharpe real estimado tras costes/slippage: 1.0-1.5.',
            },
            YIELD_CURVE: {
                icon: '📈', title: 'Curva de Tipos — ¿Viene una recesión?',
                what: 'Los gobiernos piden dinero prestado a distintos plazos (3 meses, 5 años, 10 años, 30 años). Normalmente, pedir prestado a MÁS plazo cuesta MÁS (como una hipoteca es más cara que un préstamo a 1 año). La curva muestra estos tipos de interés de menor a mayor plazo.',
                states: [
                    ['📈 Curva NORMAL (pendiente positiva)', 'Todo bien. Los tipos a largo plazo son más altos que los de corto plazo. La economía funciona con normalidad.'],
                    ['📏 Curva PLANA', 'Señal de alerta. El mercado NO espera crecimiento futuro. Puede preceder una recesión.'],
                    ['📉 Curva INVERTIDA (pendiente negativa)', '🚨 ALERTA ROJA. Los tipos a corto son MÁS ALTOS que a largo. Esto ha predicho TODAS las recesiones desde 1970 con un 100% de acierto. La recesión suele llegar 6-18 meses después.'],
                ],
                tip: 'Mira el "Spread 10Y-3M" — es la diferencia entre la yield a 10 años y a 3 meses. Si es NEGATIVO, la curva está invertida y hay señal de recesión.',
            },
            YIELD_10Y: {
                icon: '🏦', title: 'Yield 10 años — El tipo más importante del mundo',
                what: 'Es el interés que paga el gobierno de EEUU por pedir prestado a 10 años. Es EL número más importante en finanzas porque TODO depende de él: hipotecas, valoración de empresas, coste de la deuda corporativa...',
                states: [
                    ['⬆️ Subiendo rápido', 'PELIGRO para los bonos (TLT baja). Las acciones de tecnología sufren porque sus beneficios futuros "valen menos" cuando los tipos suben. TLT NO es buen refugio en este escenario.'],
                    ['⬇️ Bajando rápido', 'BUENO para bonos (TLT sube). Los inversores buscan seguridad. TLT SÍ funciona como refugio. Las acciones de tech se benefician.'],
                    ['➡️ Estable', 'Neutral. No hay dirección clara.'],
                ],
                tip: 'REGLA DE ORO: Si la yield sube, TLT (bonos largos) BAJA. Si la yield baja, TLT SUBE. Son inversamente proporcionales. Esto es CRÍTICO para decidir si TLT es buen refugio o no.',
            },
            SPY: {
                icon: '🇺🇸', title: 'SPY — El mercado USA en una sola acción',
                what: 'Es un ETF (fondo cotizado) que contiene las 500 empresas más grandes de Estados Unidos: Apple, Microsoft, Amazon, Google, etc. Comprar SPY es como comprar un trocito de toda la economía americana. Si SPY sube, "el mercado sube".',
                states: [
                    ['📈 Subiendo', 'El mercado está optimista. Las empresas grandes ganan dinero.'],
                    ['📉 Cayendo', 'Algo preocupa. Puede ser temporal (corrección = oportunidad) o serio (crisis = refugio).'],
                ],
                tip: 'SPY es nuestra inversión principal en modo "momentum" (cuando el VIX está tranquilo). Cuando hay pánico, lo que hacemos es mover dinero DE SPY HACIA refugio (TLT, GLD, o cash).',
            },
            QQQ: {
                icon: '💻', title: 'QQQ — Las 100 empresas tech más grandes',
                what: 'ETF del Nasdaq 100, dominado por tecnología: Apple, Microsoft, NVIDIA, Amazon, Meta. Es más arriesgado que SPY porque está muy concentrado en tech. Sube más cuando todo va bien, pero cae más cuando hay problemas.',
                states: [
                    ['QQQ > SPY', 'Tech lidera. Los inversores quieren crecimiento. Señal positiva.'],
                    ['QQQ < SPY', 'Rotación FUERA de tech. Los inversores prefieren cosas más seguras. OJO: puede indicar que los tipos de interés están subiendo.'],
                ],
                tip: 'Si QQQ cae más que SPY, significa que los inversores están huyendo de empresas de crecimiento — normalmente porque los tipos de interés están subiendo.',
            },
            TLT: {
                icon: '🛡️', title: 'TLT — Bonos del gobierno USA a largo plazo',

        function showGlossary(key) {
            const g = GLOSSARY[key];
            if (!g) return;
            let states = '';
            (g.states || []).forEach(([label, text]) => {
                states += `<div class="modal-state">
                <span class="modal-state-label">${label}</span>
                <span class="modal-state-text">${text}</span>
            </div>`;
            });
            document.getElementById('modal-body').innerHTML = `
            <div class="modal-title">${g.icon} ${g.title}</div>
            <div class="modal-section">
                <div class="modal-section-title">¿Qué es esto?</div>
                <div class="modal-text">${g.what}</div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title">¿Qué significan los valores?</div>
                ${states}
            </div>
            ${g.tip ? `<div class="modal-tip">
                <div class="modal-tip-title">💡 ¿Qué hago con esta información?</div>
                <div class="modal-tip-text">${g.tip}</div>
            </div>` : ''}
        `;
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modal-overlay'))
                document.getElementById('modal-overlay').classList.remove('active');
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('active');
        });

            return `<span class="info-btn" onclick="showGlossary('${key}')" title="¿Qué es esto?">?</span>`;
        }

        // ── Helpers ──
        function chgClass(v) { return v > 0.001 ? 'positive' : (v < -0.001 ? 'negative' : 'neutral'); }
        function chgTag(v, l) { const c = v > 0.001 ? 'chg-pos' : (v < -0.001 ? 'chg-neg' : ''); return `<span class="chg-tag ${c}">${l}: ${(v * 100).toFixed(1)}%</span>`; }
        function fmtPrice(p) { if (p > 10000) return p.toLocaleString('en-US', { minimumFractionDigits: 0 }); if (p > 100) return p.toFixed(1); return p.toFixed(2); }
        function scoreBar(s, max = 6) { let d = ''; for (let i = 0; i < max; i++) { const a = i < s ? 'active' : ''; const h = s >= 5 ? 'high' : ''; d += `<span class="score-dot ${a} ${h}"></span>`; } return `<span class="score-bar">${d}</span>`; }

        async function fetchData(force = false) {
            const r = await fetch(force ? '/api/refresh' : '/api/snapshot');

            document.getElementById('dashboard').innerHTML = `<div class="loading"><div class="spinner"></div> Actualizando datos...</div>`;

            </div>

            <div class="card instruments-card">
                <div class="card-title">🏦 Instrumentos</div>
                <div class="instruments-grid">${instruments}</div>
            </div>

            <div class="card fred-card">
                <div class="card-title">🏛️ Macro (FRED) ${infoBtn('FRED')}</div>
                ${fredItems || '<div style="color:var(--text-muted)">Sin datos FRED</div>'}
            </div>

            <div class="card stocks-card">
                <div class="card-title">🏆 Top ${stocks.length} Momentum ${infoBtn('MOMENTUM_SCORE')}</div>
                <table class="stocks-table">
                    <thead><tr>
                        <th>#</th><th>Ticker</th>
                        <th>Score ${infoBtn('MOMENTUM_SCORE')}</th>
                        <th>Rev QoQ ${infoBtn('REV_QOQ')}</th>
                        <th>EPS ${infoBtn('EPS')}</th>
                        <th>Precio</th><th>1d</th><th>20d</th>
                        <th>vs Max ${infoBtn('FROM_HIGH')}</th>
                        <th>Vol ${infoBtn('VOL')}</th>
                    </tr></thead>
                    <tbody>${stockRows}</tbody>
                </table>
            </div>

            <div class="card prompt-card">
                <div class="card-title" style="justify-content:space-between">
                    <span>🤖 Prompt para Gemini ${infoBtn('PROMPT')}</span>
                    <div>
                        <span id="copy-feedback" class="copy-feedback">✅ Copiado</span>
                        <button class="btn btn-primary" onclick="copyPrompt()">📋 Copiar prompt</button>
                    </div>
                </div>
                <div class="prompt-text" id="prompt-text">Cargando prompt...</div>
            </div>
        `;

            renderVixChart(vix);
            renderYieldChart(yields);
            loadPrompt();
        }

        function renderVixChart(vix) {
            const ctx = document.getElementById('vix-chart');
            if (!ctx || !vix.history) return;
            const labels = vix.dates || vix.history.map((_, i) => i);
            const ma20 = vix.history.map((_, i, a) => i < 19 ? null : a.slice(i - 19, i + 1).reduce((x, y) => x + y, 0) / 20);
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(d => typeof d === 'string' ? d.slice(5) : d), datasets: [
                        { label: 'VIX', data: vix.history, borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.1)', fill: true, borderWidth: 2, pointRadius: 0, tension: 0.3 },
                        { label: 'MA20', data: ma20, borderColor: '#58a6ff', borderWidth: 1.5, pointRadius: 0, borderDash: [5, 3] },
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(48,54,61,0.5)' }, ticks: { color: '#8b949e', font: { size: 10 } } } } }
            });
        }

        function renderYieldChart(yields) {
            const ctx = document.getElementById('yield-chart'); if (!ctx) return;
            const labels = ['3M', '5Y', '10Y', '30Y'];
            const values = labels.map(l => yields[l] ? yields[l].yield : null);
            new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Yield Curve', data: values, borderColor: '#e3b341', backgroundColor: 'rgba(227,179,65,0.1)', fill: true, borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#e3b341', tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b949e' } }, y: { grid: { color: 'rgba(48,54,61,0.5)' }, ticks: { color: '#8b949e', callback: v => v.toFixed(1) + '%' } } } }
            });
        }

        async function loadPrompt() {
            try { const r = await fetch('/api/prompt'); const t = await r.text(); const e = document.getElementById('prompt-text'); if (e) e.textContent = t; }
            catch (e) { const el = document.getElementById('prompt-text'); if (el) el.textContent = 'Error cargando prompt'; }
        }

        function copyPrompt() {
            navigator.clipboard.writeText(document.getElementById('prompt-text').textContent).then(() => {
                const f = document.getElementById('copy-feedback'); f.style.display = 'inline'; setTimeout(() => f.style.display = 'none', 2000);
            });
        }

        fetchData();
    </script>
</body>

</html>
